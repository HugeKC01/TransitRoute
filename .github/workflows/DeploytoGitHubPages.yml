name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main # Note: Change to 'main' if your default branch has been renamed
      
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest # CRITICAL FIX: ubuntu-18.04 is deprecated

    steps:
      - uses: actions/checkout@v4 # Updated from v2 to avoid Node.js warnings
      
      - uses: subosito/flutter-action@v2 # Updated from v1
        with:
          channel: 'stable'
          
      - name: Download Dependencies
        run: flutter pub get
        
      - name: Build
        run: flutter build web --release --dart2js-optimization O4
        
      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
        shell: bash
        
      - name: Commit and Push to Deployment Branch
        run: |
          git --work-tree build/web add --all
          git commit -m "Automatic deployment by github-actions"
          # Force pushing the built artifacts to a specific branch within this same repository
          git push origin HEAD:deploy-github-web-page --force
        shell: bash
